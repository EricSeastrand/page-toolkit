<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Layout Test Fixture</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #111; color: #eee; }

  /* Sticky header */
  .sticky-header {
    position: sticky;
    top: 0;
    background: #222;
    padding: 12px 20px;
    z-index: 100;
    border-bottom: 1px solid #333;
  }

  /* Hero section */
  .hero {
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    padding: 40px;
  }
  .hero h1 { font-size: 64px; }

  /* Card grid */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 40px;
  }
  .card-grid .card {
    background: #222;
    padding: 20px;
    border-radius: 8px;
    min-height: 120px;
  }

  /* Scroll trap */
  .scroll-trap {
    overflow: auto;
    height: 60px;
    margin: 20px 40px;
    background: #1a1a1a;
    padding: 10px;
  }
  .scroll-trap .inner {
    height: 80px; /* only 20px of scroll range */
  }

  /* Below fold content */
  .below-fold {
    padding: 40px;
    min-height: 200vh;
  }

  /* Fixed overlay */
  .overlay {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    padding: 12px 20px;
    border-radius: 8px;
    z-index: 200;
  }

  /* Flexbox row */
  .flex-row {
    display: flex;
    gap: 16px;
    padding: 20px 40px;
  }
  .flex-row .item {
    flex: 1;
    background: #2a2a2a;
    padding: 16px;
    border-radius: 4px;
  }
</style>
</head>
<body>
  <nav class="sticky-header">Navigation</nav>
  <section class="hero"><h1>Hero</h1></section>
  <div class="card-grid">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
    <div class="card">Card 4</div>
    <div class="card">Card 5</div>
    <div class="card">Card 6</div>
  </div>
  <div class="scroll-trap"><div class="inner">Tiny scrollable area</div></div>
  <div class="flex-row">
    <div class="item">Flex A</div>
    <div class="item">Flex B</div>
    <div class="item">Flex C</div>
  </div>
  <section class="below-fold">
    <h2>Way below the fold</h2>
    <p>Content that extends the page.</p>
  </section>
  <div class="overlay">Toast notification</div>
</body>
</html>

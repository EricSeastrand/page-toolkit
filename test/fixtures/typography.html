<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Typography Test Fixture</title>
<style>
  body {
    margin: 40px;
    background: #111;
    color: #e0e0e0;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  .display { font-size: 72px; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; }
  h1 { font-size: 48px; font-weight: 700; line-height: 1.2; }
  h2 { font-size: 32px; font-weight: 600; line-height: 1.3; }
  h3 { font-size: 24px; font-weight: 600; line-height: 1.4; }
  p { font-size: 16px; font-weight: 400; line-height: 1.6; }
  .caption { font-size: 12px; font-weight: 400; line-height: 1.4; color: #888; }
  .label { font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }
  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px; }

  /* Spacing rhythm */
  .section { margin-bottom: 48px; }
  .section + .section { padding-top: 48px; border-top: 1px solid #333; }

  /* Responsive breakpoints */
  @media (max-width: 768px) { h1 { font-size: 36px; } }
  @media (max-width: 480px) { h1 { font-size: 28px; } }
  @media (min-width: 1200px) { body { max-width: 1100px; margin: 40px auto; } }
</style>
</head>
<body>
  <div class="section">
    <p class="label">Display</p>
    <div class="display">Big Display Text</div>
  </div>
  <div class="section">
    <h1>Heading One</h1>
    <h2>Heading Two</h2>
    <h3>Heading Three</h3>
  </div>
  <div class="section">
    <p>Body text at 16px with comfortable line height for reading long paragraphs of content.</p>
    <p class="caption">Caption text — smaller, muted</p>
    <p class="label">Label Text</p>
  </div>
  <div class="section">
    <code class="mono">monospace: const x = 42;</code>
  </div>
</body>
</html>
